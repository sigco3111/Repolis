# repolis.yaml — machine-readable project manifest
# A compact, stable description of Repolis for AI agents and tooling.
# Human guide: README.md · Agent contract: AGENTS.md
schema: repolis/manifest@1

name: Repolis
tagline: The city of repos — your GitHub as a walkable 3D town.
description: >-
  A single-file 3D web app that renders every public GitHub repo of its owner as a
  walkable low-poly house whose architecture is built from real traffic (visitors,
  clones, forks, views). An LLM taxi and star-named scholar NPCs answer questions
  and drive you to any repo. Runs from one index.html with no build step.
owner:
  name: Hyeon Sang Jeon
  github: hyeonsangjeon
license: MIT
homepage: https://hyeonsangjeon.github.io/Repolis/
repository: https://github.com/hyeonsangjeon/Repolis
languages: [en, ko]

runtime:
  kind: static-web-app
  build: none            # no bundler, no package.json, no install step
  entrypoint: index.html
  serve: python3 -m http.server 8000
  renderer: three.js@0.160     # loaded via CDN import map (jsdelivr)
  node_for_tooling: ">=20"     # tested on v24; only for tests/scripts, not the site

data:
  file: repos.json
  shape: array
  generated: true
  generator: scripts/build_repos.py
  generate_cmd: GTM_DIR=data python3 scripts/build_repos.py
  note: Do not hand-edit; regenerate from data/logs/* + `gh api`.

entrypoints:
  app: index.html
  scholars: scholars.js
  data_builder: scripts/build_repos.py
  library_builder: scripts/build-contribution-library.mjs   # → assets/contribution-library.json (generated, daily)
  grounding_worker: cloudflare-taxi/src/grounded.js
  realtime_worker: cloudflare/src
  council_engine: council/engine.js

deploy:
  site:
    target: github-pages
    branch: main
    dir: /            # root, .nojekyll present
    command: git push origin main
    rule: "rebase onto origin/main first (a daily Action pushes `chore: refresh`)"
  grounding_worker:
    target: cloudflare-workers
    name: repolis-taxi
    command: cd cloudflare-taxi && npx wrangler deploy
  realtime_worker:
    target: cloudflare-workers
    name: repolis-rt
    command: cd cloudflare && npx wrangler deploy

endpoints:
  grounding:
    url: https://repolis-taxi.wingnut0310.workers.dev/
    method: POST
    body: '{ "question": "<text>", "npc": "taxi|msdocs|deepwiki", "lang": "ko|en", "history": [] }'
    wired_in: index.html (GROUNDED_DEFAULT)
    required: false      # absent backend → silent Local fallback
  realtime:
    url: wss://repolis-rt.wingnut0310.workers.dev
    wired_in: index.html (RT_DEFAULT)
    required: false      # absent backend → solo city

features:
  - id: walkable-city
    summary: WoW-style camera; metrics drive building height/width/ornament/glow.
  - id: llm-taxi
    summary: Natural-language repo finder that drives you to the house (Local · WebLLM · AI Foundry Live).
  - id: scholars
    summary: Star-named MCP-grounded NPCs (POLARIS taxi, VEGA · MS Learn, RIGEL · DeepWiki) with trace panels.
  - id: shareable-towns
    summary: '?user=<login> rebuilds the town from any public GitHub user.'
  - id: realtime
    summary: Optional multiplayer presence + live visitor counter.
  - id: kronos-council
    summary: Deterministic multi-agent debate→verdict engine (council/), 130+56 hermetic checks.
  - id: i18n-daynight
    summary: Live English/한국어 toggle and day/night with activity-lit windows.

verify:
  golden_rule: All tests below must pass before any deploy (hermetic — no net/clock/LLM/cost).
  commands:
    - node council/test.mjs        # → ALL GREEN — 130 checks passed
    - node council/test-live.mjs   # → 56 passed, 0 failed
    - node scripts/smoke.mjs       # → ALL GREEN — index.html static regression guards
    - node --check scholars.js
    - node --check cloudflare-taxi/src/grounded.js
  ui: serve locally and drive the page in Chrome DevTools; require 0 console errors (mobile 390x844 + desktop).

constraints:
  git_author: Hyeon Sang Jeon <wingnut0310@gmail.com>
  commit_trailer: "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
  public_safe: Only public repos are shown; never expose private repo names or secrets.
  generated_data: Edit scripts/build_repos.py, not repos.json directly.
  no_build_step: Keep the site a single dependency-free static index.html.

do_not_touch:   # local/secret, gitignored — never commit
  - "*.local.md"
  - cloudflare-taxi/.dev.vars
  - CLAUDE.md
  - CHRONOPOLIS_SPEC.md
  - .wrangler/
